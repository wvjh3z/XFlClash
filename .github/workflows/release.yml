# 形态 A 正式发布（signed release APK → GitHub Release）。规范见 .github/BUILD_AND_RELEASE.md。
#
# 触发：推 v* tag（如 v0.8.94）。
#   git tag v0.8.94 && git push origin v0.8.94
#
# versionName 来自 tag（去掉前缀 v）；versionCode 用 github.run_number（单调递增）。
# 需要的 secrets 见 .github/BUILD_AND_RELEASE.md §6.3。
name: Release (form-a)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'versionName（如 0.8.94），不填则用 pubspec'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout Xboard_sdk (sibling)
        uses: actions/checkout@v4
        with:
          repository: wvjh3z/Xboard_sdk
          path: ../Xboard_sdk
          token: ${{ secrets.SIBLING_SDK_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      # 计算 versionName / versionCode / buildTag
      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VN="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VN="${GITHUB_REF_NAME#v}"
          else
            VN="$(grep -m1 '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*([^+]+).*/\1/')"
          fi
          VC="${{ github.run_number }}"
          TAG="rel-$(date +%Y%m%d-%H%M)-$(git rev-parse --short HEAD)"
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "build_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "构建: versionName=$VN versionCode=$VC tag=$TAG"

      - name: Android signing
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json || true
          {
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } >> android/local.properties

      - name: Deps + codegen
        run: |
          flutter pub get
          ( cd ../Xboard_sdk && dart pub get && dart run build_runner build --delete-conflicting-outputs )
          dart run build_runner build --delete-conflicting-outputs

      - name: Prepare flavor (inject secrets)
        env:
          XBOARD_BOOTSTRAP_AES_KEY: ${{ secrets.XBOARD_BOOTSTRAP_AES_KEY }}
        run: dart run tool/prepare_flavor.dart --flavor brand_a --target release

      # CI runner 天然干净，无需 flutter clean；保留以防 cache action 复用。
      - name: Build signed release APK (split-per-abi)
        run: |
          flutter build apk --release --flavor brand_a \
            --dart-define-from-file=flavor_defines.json \
            --dart-define=XB_FORM_A=true \
            --dart-define=XB_BUILD_TAG="${{ steps.ver.outputs.build_tag }}" \
            --build-name="${{ steps.ver.outputs.version_name }}" \
            --build-number="${{ steps.ver.outputs.version_code }}" \
            --split-per-abi

      - name: Rename artifacts
        run: |
          cd build/app/outputs/flutter-apk
          VN="${{ steps.ver.outputs.version_name }}"
          for f in app-*-brand_a-release.apk; do
            [ -f "$f" ] || continue
            abi="$(echo "$f" | sed -E 's/app-(.*)-brand_a-release.apk/\1/')"
            cp "$f" "MyClient-${VN}-${abi}.apk"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.ver.outputs.version_name) }}
          name: MyClient ${{ steps.ver.outputs.version_name }}
          body: |
            MyClient ${{ steps.ver.outputs.version_name }}
            - versionCode: ${{ steps.ver.outputs.version_code }}
            - buildTag: ${{ steps.ver.outputs.build_tag }}

            安装后「我的 → 关于」应显示：v${{ steps.ver.outputs.version_name }}+${{ steps.ver.outputs.version_code }} · ${{ steps.ver.outputs.build_tag }}
          files: build/app/outputs/flutter-apk/MyClient-*.apk
          fail_on_unmatched_files: true
