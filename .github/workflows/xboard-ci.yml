# Xboard 模块 CI（µ-8 build_runner 顺序 / DD-20 contract / DD-21 锚点 / NFR-7）。
#
# 命名 xboard-ci.yml（不碰 upstream FlClash 既有 workflow，加而不改）。
# 🔴 当前仅手动触发（workflow_dispatch）：v0.1 开发期 + sibling SDK 需 SIBLING_SDK_TOKEN secret，
#    自动跑会失败。配齐 secrets 后改回 push/pull_request 触发（见下方注释块）。
#
# 依赖 secrets（与 release-build.yml 统一命名，brand 前缀为未来 brand_b 留位）：
#   SIBLING_SDK_TOKEN / BRAND_A_FLAVOR_YAML_B64 / BRAND_A_FALLBACK_BIN_B64 / BRAND_A_AES_KEY_B64
name: Xboard CI

on:
  workflow_dispatch:

# 配齐 secrets（SIBLING_SDK_TOKEN / BRAND_A_*）后启用：
#  push:
#    branches: [main]
#    paths: ['lib/xboard/**', 'test/xboard/**', 'test/sdk_contract_test.dart', 'tool/**', '.kiro/**']
#  pull_request:
#    paths: ['lib/xboard/**', 'test/xboard/**']

jobs:
  analyze-and-test:
    name: Analyze + Test (Xboard module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # sibling SDK 也需 checkout（path 依赖）。
          submodules: false

      # actions/checkout 不允许 path 在 workspace 外（`..`）；SDK 是平级 path 依赖，
      # 须手动 clone 到真正的 sibling 目录。SIBLING_SDK_TOKEN 为 secret，日志自动打码。
      - name: Checkout Xboard_sdk (sibling)
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.SIBLING_SDK_TOKEN }}@github.com/wvjh3z/Xboard_sdk.git" "${GITHUB_WORKSPACE}/../Xboard_sdk"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # µ-8 顺序：SDK build_runner → client pub get → client build_runner → analyze → test
      - name: SDK build_runner
        working-directory: ../Xboard_sdk
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Client pub get
        run: flutter pub get

      - name: Client build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # DD-21：FlClash 行号锚点机器校验（接缝点未漂移）。
      - name: Check line anchors (DD-21)
        run: dart run tool/check-line-anchors.dart

      # 接缝点白名单完整性（改 FlClash 既有文件必登记 PATCHES.md）。
      - name: Check seam whitelist
        run: dart run tool/check-seam-whitelist.dart --baseline ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
        continue-on-error: true # baseline 不可达时不阻断（本地 pre-commit 已覆盖）

      - name: Analyze (xboard module, fatal-infos)
        run: flutter analyze lib/xboard

      # DD-20 contract + 全 xboard 单测/widget test。
      - name: Test (xboard + contract)
        run: flutter test test/xboard/ test/sdk_contract_test.dart test/_fixtures/

  # 4 平台 build matrix（原生工具链；headless dev 环境跑不了，CI 补齐）。
  build-matrix:
    name: Build ${{ matrix.platform }}
    needs: analyze-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux }
          - { os: ubuntu-latest, platform: apk }
          - { os: windows-latest, platform: windows }
          - { os: macos-latest, platform: macos }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # actions/checkout 不允许 path 在 workspace 外（`..`）；SDK 是平级 path 依赖，
      # 须手动 clone 到真正的 sibling 目录。SIBLING_SDK_TOKEN 为 secret，日志自动打码。
      - name: Checkout Xboard_sdk (sibling)
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.SIBLING_SDK_TOKEN }}@github.com/wvjh3z/Xboard_sdk.git" "${GITHUB_WORKSPACE}/../Xboard_sdk"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: SDK build_runner
        working-directory: ../Xboard_sdk
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - name: Client deps + codegen
        run: flutter pub get && dart run build_runner build --delete-conflicting-outputs
      # 层1 后 flavor.yaml / fallback.bin 已移出仓库 → 从 secrets 还原（prepare_flavor 需要）。
      - name: Restore brand_a flavor secrets
        run: |
          mkdir -p flavors/brand_a/assets
          echo "${{ secrets.BRAND_A_FLAVOR_YAML_B64 }}"  | base64 -d > flavors/brand_a/flavor.yaml
          echo "${{ secrets.BRAND_A_FALLBACK_BIN_B64 }}" | base64 -d > flavors/brand_a/assets/fallback.bin
        continue-on-error: true # secrets 未配齐时不阻断（与下方 prepare_flavor 同为 best-effort）
      # prepare_flavor 生成 flavor_defines.json（target=test 与 build_local.sh 一致，aesKey 空放宽）。
      # AES key 经 BRAND_A_AES_KEY_B64 在生成后注入 flavor_defines.json（见 release-build.yml 完整链路）。
      - name: Prepare flavor
        run: |
          dart run tool/prepare_flavor.dart --flavor brand_a --target test
          jq --arg k "${{ secrets.BRAND_A_AES_KEY_B64 }}" '.XB_AES_KEY_B64 = $k' flavor_defines.json > flavor_defines.tmp && mv flavor_defines.tmp flavor_defines.json
        continue-on-error: true # flavor 资产未齐时不阻断（W8.5 完善后转 required）
      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release
        continue-on-error: true # 原生工具链 / 签名未齐时不阻断（RC 前转 required）

  # 形态 A（v2.0）专属防护（spec xboard-form-a-ui-revamp / W6）。
  form-a-guards:
    name: Form-A guards (flavor matrix + upstream diff + seam imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff 断言需完整历史
      # actions/checkout 不允许 path 在 workspace 外（`..`）；SDK 是平级 path 依赖，
      # 须手动 clone 到真正的 sibling 目录。SIBLING_SDK_TOKEN 为 secret，日志自动打码。
      - name: Checkout Xboard_sdk (sibling)
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.SIBLING_SDK_TOKEN }}@github.com/wvjh3z/Xboard_sdk.git" "${GITHUB_WORKSPACE}/../Xboard_sdk"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: SDK build_runner
        working-directory: ../Xboard_sdk
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - name: Client deps + codegen
        run: flutter pub get && dart run build_runner build --delete-conflicting-outputs

      # W6.1 / Property 2：形态 A 上游零侵入（仅接缝点 #9 application.dart）。
      - name: Form-A upstream diff assert (Property 2)
        run: dart run tool/check_form_a_upstream_diff.dart origin/main

      # W6.2 / 风险②a：复用符号锚点未漂移（含形态 A 复用符号）。
      - name: Reuse-symbol anchors (DD-21)
        run: dart run tool/check-line-anchors.dart

      # W2.6 / NFR-1.6：适配层铁律（tabs 不直 import lib/views）。
      - name: Seam import guard (adapter rule)
        run: dart run tool/check_seam_imports.dart

      # 主题作用域守卫：lib/xboard 下禁止裸 showModalBottomSheet/showDialog/MaterialPageRoute
      # （防「背景泛色/逃逸 formA 主题」回归，须走 showXbBottomSheet/xbShowDialog/xbPush）。
      - name: Theme entrypoint guard (no escape)
        run: dart run tool/check_xb_theme_entrypoints.dart

      - name: Analyze (xboard module, fatal-infos)
        run: flutter analyze lib/xboard

      - name: Form-A shell tests
        run: flutter test test/xboard/shell/

      # W6.1 / Property 3：formA 与 formB 双 flavor 均可 build（apk debug 冒烟）。
      - name: Build formB (default)
        run: flutter build apk --debug
        continue-on-error: true # 原生工具链未齐时不阻断（RC 前转 required）
      - name: Build formA (XB_FORM_A=true)
        run: flutter build apk --debug --dart-define=XB_FORM_A=true
        continue-on-error: true

