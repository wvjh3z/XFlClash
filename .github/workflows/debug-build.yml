# 形态 A 测试包（debug APK → artifact，不发 Release）。规范见 .github/BUILD_AND_RELEASE.md。
#
# 触发：手动（workflow_dispatch）或 PR。产物为全 ABI debug APK，包名 com.follow.clash.dev，
# 可与正式版共存；用于真机/模拟器自测。
name: Debug build (form-a)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'flavors/**'

permissions:
  contents: read

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Xboard_sdk (sibling)
        uses: actions/checkout@v4
        with:
          repository: wvjh3z/Xboard_sdk
          path: ../Xboard_sdk
          token: ${{ secrets.SIBLING_SDK_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Compute buildTag
        id: ver
        run: echo "build_tag=dbg-$(date +%Y%m%d-%H%M)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deps + codegen
        run: |
          flutter pub get
          ( cd ../Xboard_sdk && dart pub get && dart run build_runner build --delete-conflicting-outputs )
          dart run build_runner build --delete-conflicting-outputs

      - name: Prepare flavor
        env:
          XBOARD_BOOTSTRAP_AES_KEY: ${{ secrets.XBOARD_BOOTSTRAP_AES_KEY }}
        run: dart run tool/prepare_flavor.dart --flavor brand_a --target release
        continue-on-error: true

      - name: Build debug APK (all ABIs)
        run: |
          flutter build apk --debug --flavor brand_a \
            --dart-define-from-file=flavor_defines.json \
            --dart-define=XB_FORM_A=true \
            --dart-define=XB_BUILD_TAG="${{ steps.ver.outputs.build_tag }}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyClient-debug-${{ steps.ver.outputs.build_tag }}
          path: build/app/outputs/flutter-apk/app-brand_a-debug.apk
          if-no-files-found: error
